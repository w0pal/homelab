services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - 80:80
      - 81:81
      - 443:443
    volumes:
      - /home/homeserver/nginx-proxy-manager/data:/data
      - /home/homeserver/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    networks:
      - shared-web

networks:
  shared-web:
    external: true
