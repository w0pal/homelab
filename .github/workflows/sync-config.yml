name: Sync Config from Homeserver

on:
  workflow_dispatch:
    inputs:
      ssh_host:
        description: 'Homeserver SSH host (user@ip)'
        required: true
        default: 'homeserver@192.168.0.206'
      ssh_key:
        description: 'SSH private key (from GitHub Secrets)'
        required: true
      commit_message:
        description: 'Commit message'
        required: false
        default: 'chore: sync configs from homeserver'

  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM

permissions:
  contents: write

jobs:
  sync-configs:
    name: Pull configs from homeserver
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOMESERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H 192.168.0.206 >> ~/.ssh/known_hosts

      - name: Pull AdGuard Home config
        run: |
          scp homeserver@192.168.0.206:/home/homeserver/AdGuardHome.yaml services/adguardhome/AdGuardHome.yaml

      - name: Pull Caddy config
        run: |
          scp homeserver@192.168.0.206:/home/homeserver/Caddyfile services/caddy/Caddyfile

      - name: Pull Vaultwarden docker-compose
        run: |
          scp homeserver@192.168.0.206:/home/homeserver/vaultwarden/docker-compose.yml services/vaultwarden/docker-compose.yml

      - name: Pull Watchtower docker-compose
        run: |
          scp homeserver@192.168.0.206:/home/homeserver/watchtower/docker-compose.yml services/watchtower/docker-compose.yml

      - name: Pull Caddy docker-compose
        run: |
          scp homeserver@192.168.0.206:/home/homeserver/caddy/docker-compose.yml services/caddy/docker-compose.yml

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "${{ github.event.inputs.commit_message || 'chore: sync configs from homeserver' }}" -m "Auto-synced from homeserver at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No configuration changes to commit"