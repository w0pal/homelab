name: Auto-commit Server Config Changes

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

permissions:
  contents: write

jobs:
  check-and-commit:
    name: Check for config changes
    runs-on: [self-hosted, linux, arm64]
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync AdGuard Home config
        run: |
          cp /home/homeserver/adguardhome/conf/AdGuardHome.yaml services/adguardhome/AdGuardHome.yaml

      - name: Sync Caddy config
        run: |
          cp /home/homeserver/Caddyfile services/caddy/Caddyfile

      - name: Sync Watchtower config
        run: |
          cp /home/homeserver/watchtower/docker-compose.yml services/watchtower/docker-compose.yml

      - name: Sync Caddy docker-compose
        run: |
          cp /home/homeserver/caddy/docker-compose.yml services/caddy/docker-compose.yml

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-sync homeserver configs" -m "Auto-detected and synced configuration changes from homeserver at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No configuration changes detected"
